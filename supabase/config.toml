# A non-default Supabase project configuration file.
# For complete docs see: https://supabase.com/docs/guides/local-development/cli/config

[project]
project_id = "azuhdgjyxuxyovnwxgmx"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website.
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = false
[auth.external.azure]
enabled = false
[auth.external.bitbucket]
enabled = false
[auth.external.discord]
enabled = false
[auth.external.facebook]
enabled = false
[auth.external.figma]
enabled = false
[auth.external.github]
enabled = false
[auth.external.gitlab]
enabled = false
[auth.external.google]
enabled = false
[auth.external.keycloak]
enabled = false
[auth.external.linkedin_oidc]
enabled = false
[auth.external.notion]
enabled = false
[auth.external.twitch]
enabled = false
[auth.external.twitter]
enabled = false
[auth.external.slack_oidc]
enabled = false
[auth.external.spotify]
enabled = false
[auth.external.workos]
enabled = false
[auth.external.zoom]
enabled = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[analytics]
enabled = false
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
